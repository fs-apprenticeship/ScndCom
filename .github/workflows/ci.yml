---
name: CI

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

jobs:
  lint_and_test:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x # Matches Vercel project
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier . --check

      - name: Run stylelint
        run: npx stylelint "**/*.{css,scss}"

      - name: Run type check
        run: npm run check-types

      - name: Run knip
        run: npm run knip

      - name: Run Prisma format check
        run: npx prisma format --check

      - name: Run Prisma validate
        run: npx prisma validate

      - name: Run Prisma lint
        run: npx prisma-lint

        # Runs pending migrations against the CI Postgres service
        # (non-interactive); i.e., "deploy" is not actually a deployment.
      - name: Prepare CI database
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm run test
